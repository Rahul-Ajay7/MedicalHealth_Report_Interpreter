  <!-- Sparkle above dot -->
  <line x1="72" y1="29" x2="72" y2="25" stroke="#6EE7B7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="68" y1="32" x2="65" y2="29" stroke="#6EE7B7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="76" y1="32" x2="79" y2="29" stroke="#6EE7B7" stroke-width="1.8" stroke-linecap="round"/>

</svg>
