<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">

  <!-- Background -->
  <rect width="80" height="80" rx="20" fill="#065F46"/>

  <!-- ECG heartbeat line -->
  <polyline
    points="10,40  24,40  28,30  32,50  37,16  42,56  46,40  62,40  68,40  72,40"
    fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI spark dot -->
